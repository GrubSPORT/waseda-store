<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>早稲田大学バスケットボール部 ONLINE STORE</title>
<style>
  :root{ --primary:#9E1B32; --ink:#16151a; --muted:#6b6770; --line:#e6e3e8; --bg:#f4f2f5; }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,"Noto Sans JP",sans-serif;line-height:1.7;}
  .wrap{max-width:520px;margin:0 auto;padding:0 20px 60px;}
  header{background:linear-gradient(180deg,#2a2530,var(--primary));color:#fff;padding:34px 20px;text-align:center;}
  header .team{font-size:14px;letter-spacing:.06em;margin:0;font-weight:700;opacity:.9;}
  header .store{font-size:22px;font-weight:700;margin:6px 0 0;letter-spacing:.03em;}
  .ig-note{display:none;background:#fff3cd;border:1px solid #ffe08a;border-radius:10px;padding:14px;margin:20px 0 0;font-size:14px;}
  .ig-note b{color:#9E1B32;}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:22px;margin-top:20px;text-align:center;}
  .card p{margin:0 0 16px;font-size:15px;}
  .btn{display:block;width:100%;padding:16px;background:var(--primary);color:#fff;text-decoration:none;border-radius:12px;font-size:17px;font-weight:700;letter-spacing:.03em;border:none;cursor:pointer;font-family:inherit;}
  .btn2{display:block;width:100%;padding:13px;background:#fff;color:var(--primary);border:1.5px solid var(--primary);border-radius:12px;font-size:14px;font-weight:700;margin-top:12px;cursor:pointer;font-family:inherit;}
  .sub{font-size:12px;color:var(--muted);margin-top:14px;}
  .copied{display:none;color:#1a7f37;font-size:13px;font-weight:700;margin-top:10px;}
  footer{text-align:center;margin-top:28px;font-size:11px;color:var(--muted);letter-spacing:.08em;}
</style>
</head>
<body>
<header>
  <p class="team">WASEDA UNIVERSITY BASKETBALL</p>
  <p class="store">ONLINE STORE</p>
</header>
<div class="wrap">

  <div class="ig-note" id="igNote">
    <b>スマホのアプリ内で開いています。</b><br>
    下のボタンで Safari / Chrome が開き、注文フォームに進めます。開かない場合は「URLをコピー」してブラウザに貼り付けてください。
  </div>

  <div class="card">
    <p>下のボタンから注文フォームに進めます。</p>
    <a class="btn" id="orderBtn" href="#">注文フォームを開く</a>
    <button class="btn2" id="copyBtn" type="button">開けない場合：URLをコピー</button>
    <div class="copied" id="copied">✅ コピーしました。Safari/Chromeのアドレス欄に貼り付けてください。</div>
    <p class="sub">受付期間・商品はフォーム内でご確認ください。</p>
  </div>

  <footer>POWERED BY GRUB SPORT</footer>
</div>

<script>
  var FORM_URL = "https://script.google.com/macros/s/AKfycbym2b64KufXchTpxOT10SyJaZX0B-h0E-_FGa57aSR5DUS0BiI1xg2SqDoAP9phzv_LUA/exec?team=WASEDA_BB";

  var ua = navigator.userAgent || "";
  var isIOS = /iPhone|iPad|iPod/i.test(ua);
  var inApp = /Instagram|FBAN|FBAV|FB_IAB|Line/i.test(ua);

  // アプリ内ブラウザなら案内を表示
  if(inApp){ document.getElementById("igNote").style.display = "block"; }

  // ボタン：iOSアプリ内は x-safari- でSafari強制、それ以外は通常遷移
  var btn = document.getElementById("orderBtn");
  if(isIOS && inApp){
    btn.setAttribute("href", "x-safari-" + FORM_URL);
  } else {
    btn.setAttribute("href", FORM_URL);
    btn.setAttribute("target", "_blank");
    btn.setAttribute("rel", "noopener");
  }

  // コピー保険
  document.getElementById("copyBtn").onclick = function(){
    var done = function(){ document.getElementById("copied").style.display = "block"; };
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(FORM_URL).then(done).catch(function(){ fallback(); });
    } else { fallback(); }
    function fallback(){
      var t = document.createElement("textarea");
      t.value = FORM_URL; document.body.appendChild(t); t.select();
      try { document.execCommand("copy"); done(); } catch(e){}
      document.body.removeChild(t);
    }
  };
</script>
</body>
</html>
